<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahorro Auto PRO+</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:#0f172a;color:#e5e7eb}
.layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:#020617;padding:24px}
.main{flex:1;padding:20px}
.card{background:#111827;padding:20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.4)}
h1{margin-top:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column}
label{font-size:12px;color:#cbd5f5;margin-bottom:4px}
input,select{padding:10px;border-radius:10px;border:1px solid #334155;background:#020617;color:#fff}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.kpi{padding:18px;border-radius:14px;text-align:center;font-weight:600}
.nafta{background:#dc2626}
.elec{background:#2563eb}
.ahorro{background:#16a34a}
.extra{background:#1e293b}
.highlight{margin-top:20px;padding:15px;border-radius:12px;text-align:center;font-weight:700}
.indicador{margin-top:10px;padding:12px;border-radius:12px;text-align:center;font-weight:600}
.verde{background:#16a34a;color:#022c22}
.amarillo{background:#eab308;color:#422006}
.rojo{background:#dc2626;color:#fee2e2}
.actions{display:flex;gap:10px;margin-top:15px}
button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.secondary{background:#475569;color:#fff}

@media(max-width:900px){
.layout{flex-direction:column}
.sidebar{width:100%}
.grid{grid-template-columns:1fr}
.cards{grid-template-columns:1fr}
.actions{flex-direction:column}
}
</style>
</head>
<body>

<div class="layout">
<div class="sidebar">
<h2>Ahorro Auto PRO+</h2>
<p>Simulador completo de costos</p>
<p>• Combustible</p>
<p>• Patente</p>
<p>• Seguro</p>
</div>

<div class="main">
<div class="card">
<h1>¿Te conviene pasarte a eléctrico?</h1>

<div class="grid">
<div class="field">
<label>Kilómetros por mes</label>
<input id="km" type="number">
</div>
<div class="field">
<label>Consumo nafta (km/L)</label>
<input id="consNafta" type="number" value="14">
</div>
<div class="field">
<label>Precio nafta</label>
<input id="precioNafta" type="number" value="82.27">
</div>
<div class="field">
<label>Tipo de uso</label>
<select id="tipoUso">
<option value="ciudad">Ciudad (-10%)</option>
<option value="mixto" selected>Mixto</option>
<option value="ruta">Ruta (+10%)</option>
</select>
</div>
<div class="field">
<label>Precio electricidad</label>
<input id="precioKwh" type="number" value="2.98">
</div>
<div class="field">
<label>Valor inversión eléctrico (USD)</label>
<input id="precioAuto" type="number">
</div>
<div class="field">
<label>Precio dólar</label>
<input id="dolar" type="number" value="40">
</div>

<!-- NUEVO -->
<div class="field">
<label>Patente actual (anual)</label>
<input id="patenteNafta" type="number" placeholder="Ej: 30000">
</div>
<div class="field">
<label>Patente eléctrico (anual)</label>
<input id="patenteElec" type="number" placeholder="Ej: 15000">
</div>
<div class="field">
<label>Seguro actual (mensual)</label>
<input id="seguroNafta" type="number" placeholder="Ej: 2500">
</div>
<div class="field">
<label>Seguro eléctrico (mensual)</label>
<input id="seguroElec" type="number" placeholder="Ej: 3000">
</div>

</div>

<div class="cards">
<div class="kpi nafta">Nafta / mes<br><span id="nafta">0</span></div>
<div class="kpi elec">Eléctrico / mes<br><span id="electrico">0</span></div>
<div class="kpi ahorro">Ahorro / mes<br><span id="ahorro">0</span></div>

<div class="kpi extra">Patente ahorro anual<br><span id="ahorroPatente">0</span></div>
<div class="kpi extra">Seguro ahorro anual<br><span id="ahorroSeguro">0</span></div>
<div class="kpi extra">Ahorro total anual<br><span id="totalAnual">0</span></div>
</div>

<div id="highlight" class="highlight">Resultado inversión</div>
<div id="indicador" class="indicador">Resultado</div>

<div class="actions">
<button class="primary" onclick="calcular()">Calcular</button>
</div>

</div>
</div>
</div>

<script>
function calcular(){
const km=val('km');
let consElec=14.6;
let tipo=document.getElementById('tipoUso').value;
if(tipo==='ciudad') consElec*=0.9;
if(tipo==='ruta') consElec*=1.1;

const nafta=(km/val('consNafta'))*val('precioNafta');
const elec=(km*consElec/100)*val('precioKwh');
const ahorroComb=nafta-elec;

// patente
const ahorroPatente = val('patenteNafta') - val('patenteElec');

// seguro anual
const ahorroSeguro = (val('seguroNafta') - val('seguroElec')) * 12;

const totalAnual = (ahorroComb*12) + ahorroPatente + ahorroSeguro;

set('nafta',nafta);
set('electrico',elec);
set('ahorro',ahorroComb);
set('ahorroPatente',ahorroPatente);
set('ahorroSeguro',ahorroSeguro);
set('totalAnual',totalAnual);

let inversion = val('precioAuto') * val('dolar');
let hl=document.getElementById('highlight');
if(inversion>0){
if(totalAnual*5 >= inversion){hl.className='highlight verde';hl.innerText='En 5 años recuperás todo y ganás dinero';}
else{hl.className='highlight amarillo';hl.innerText='En 5 años aún no recuperás todo';}
}
}

function val(id){return +document.getElementById(id).value||0}
function set(id,v){document.getElementById(id).innerText=Math.round(v)}
</script>

</body>
</html>
